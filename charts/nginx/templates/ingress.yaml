apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: movie-ingress
spec:
  rules:
  - host: k3.aiko.abrdns.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 8080
              