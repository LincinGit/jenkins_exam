apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: movie-db
spec:
  serviceName: movie-db
  replicas: 1
  selector:
    matchLabels:
      app: movie-db
  template:
    metadata:
      labels:
        app: movie-db
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgresMovie.image }}
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: configmap
              #key: postgresql://movie_db_username:movie_db_password@movie-db/movie_db_dev
              key: movie_db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: secrets
              # key: postgresql://movie_db_username:movie_db_password@movie-db/movie_db_dev
              key: movie_db_username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: secrets
              # key: postgresql://movie_db_username:movie_db_password@movie-db/movie_db_dev
              key: movie_db_password

        # env:
        # - name: POSTGRES_DB
        #   value: {{ .Values.postgresMovie.database }}
        # - name: POSTGRES_USER
        #   value: {{ .Values.postgresMovie.username }}
        # - name: POSTGRES_PASSWORD
        #   value: {{ .Values.postgresMovie.password }}
        ports:
        - containerPort: 5432