apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movie-service
  template:
    metadata:
      labels:
        app: movie-service
    spec:
      containers:
      - name: movie-service
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URI
          value: postgresql://movie_db_username:movie_db_password@movie-db/movie_db_dev
        # - name: DATABASE_URI
        #   valueFrom:
        #     secretKeyRef:
        #       name: secrets
        #       key: DATABASE_URI
        - name: MOVIE_SERVICE_HOST_URL
          value: http://movie-service:8000/api/v1/movie/
